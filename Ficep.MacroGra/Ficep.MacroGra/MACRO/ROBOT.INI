Comment=Direttorio contenente le macro figure
Comment=
Comment=400 č il numero max di macro (ovvero numero di linee MAC:) per ogni gruppo
Comment=
Comment=IWF:1	se la macro č interna e taglia ala fissa + anima
Comment=
[CONFIG]
ROB_GRP_ORD=0

[ROBOT]
PATH=ROBOT
PATH_TMP=ROBOT\TMP
EST=.MAC
OPT=1

